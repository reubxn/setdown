name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: typecheck
        run: npx tsc --noEmit

      - name: lint
        run: npm run lint

      - name: test
        run: npm test

      - name: build
        run: npm run build
        env:
          NEXT_PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
